updates:
- allow:
  - dependency-type: all
  commit-message:
    prefix: ci(actions)
  directory: /
  labels:
  - dependencies
  package-ecosystem: github-actions
  schedule:
    interval: weekly
- commit-message:
    prefix: ci(pre-commit)
  directory: /
  labels:
  - dependencies
  package-ecosystem: pre-commit
  schedule:
    interval: weekly
version: 2
